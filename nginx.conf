server {
  listen 80;
  server_name _;

  # Root directory for the static files
  root /usr/share/nginx/html;
  index index.html;

  # This is the key part for single-page applications (SPAs)
  location / {
    # If a file is not found, fall back to index.html
    # This allows React Router to handle the routing on the client-side.
    try_files $uri /index.html;
  }

  # Optional: You can add headers for security or caching here
  # Example:
  # location ~* \.(?:ico|css|js|gif|jpe?g|png)$ {
  #   expires 1y;
  #   add_header Cache-Control "public";
  # }
}
